version: '3.8'

services:
  frontend:
    build:
      context: ./client
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - DB_HOST=database
      - DB_USER=root
      - DB_PASSWORD=your_secure_db_password
      - DB_NAME=sobjiwala_db
    depends_on:
      - database
    restart: always

  database:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: your_secure_db_password
      MYSQL_DATABASE: sobjiwala_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_production_data:/var/lib/mysql
    restart: always

volumes:
  mysql_production_data: