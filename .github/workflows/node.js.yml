name: Production Deployment (Dockerized)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to KVM Server via Docker
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            echo "--- Automation Hook Triggered ---"
            cd /home/ubuntu/testapp/my-test-project || { echo "Directory missing"; exit 1; }
            
            echo "Killing legacy PM2 processes and port bindings..."
            pm2 delete all 2>/dev/null || true
            pm2 kill 2>/dev/null || true
            sudo fuser -k 80/tcp 5000/tcp 3306/tcp 2>/dev/null || true
            
            echo "Syncing repository branch..."
            git reset --hard origin/main
            git pull origin main
            
            echo "Orchestrating Container Stack..."
            sudo docker compose down --remove-orphans
            sudo docker compose up --build -d
            
            echo "Pruning system cache..."
            sudo docker image prune -f
            
            echo "--- Automation Cycle Completed Cleanly ---"
