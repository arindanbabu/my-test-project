name: Production Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # UNCOMMENT the line below ONLY if your secrets are inside an "Environment"
    # environment: production 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to KVM Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          # This timeout helps catch connection issues early
          timeout: 40s
          script: |
            echo "Successfully connected!"
            cd ~/testapp/my-test-project/backend || exit 1
            git pull origin main
            npm install --production
            pm2 restart all || pm2 start index.js --name "auth-api"