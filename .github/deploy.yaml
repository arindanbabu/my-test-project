name: Production Deployment (Dockerized)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to KVM Server via Docker
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            echo "--- Automation Starting ---"
            
            # FORCE CHANGE: Use the absolute path from Step 1 here
            cd /home/ubuntu/testapp/my-test-project || { echo "Directory missing"; exit 1; }
            
            echo "Clearing rogue background processes..."
            sudo fuser -k 80/tcp 2>/dev/null || true
            sudo fuser -k 5000/tcp 2>/dev/null || true
            sudo fuser -k 3306/tcp 2>/dev/null || true
            
            echo "Pulling latest code from main branch..."
            git reset --hard origin/main
            git pull origin main
            
            echo "Stopping old docker configurations..."
            sudo docker compose down --remove-orphans
            
            echo "Building and launching containers via automation..."
            sudo docker compose up --build -d
            
            echo "Pruning dangling space..."
            sudo docker image prune -f
            
            echo "--- Automation Complete! ---"