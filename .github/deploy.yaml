name: Production Deployment (Dockerized)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to KVM Server via Docker
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            echo "--- Linked to OVH VPS ---"
            cd ~/testapp/my-test-project || { echo "Directory missing"; exit 1; }
            
            # 1. Force-kill any rogue background processes squatting on your ports
            echo "Clearing port conflicts..."
            sudo fuser -k 80/tcp 2>/dev/null || true
            sudo fuser -k 5000/tcp 2>/dev/null || true
            sudo fuser -k 3306/tcp 2>/dev/null || true
            
            # 2. Pull the clean Docker updates from GitHub
            git pull origin main
            
            # 3. Safely stop existing containers
            echo "Stopping old containers..."
            docker compose down --remove-orphans
            
            # 4. Build and start the clean stack in the background
            echo "Launching full stack..."
            docker compose up --build -d
            
            # 5. Clean up stale dangling image cache layers
            docker image prune -f
            
            echo "--- Complete Stack Dockerized Successfully! ---"